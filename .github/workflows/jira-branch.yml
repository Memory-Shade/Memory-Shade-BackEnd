name: Jira Branch Automation

on:
  issues:
    types: [opened, closed]

permissions:
  contents: write

jobs:
  issue-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Decide branch name from issue title
        id: vars
        shell: bash
        run: |
          set -euo pipefail

          TITLE="${{ github.event.issue.title }}"
          NUM="${{ github.event.issue.number }}"

          PREFIX="feat"
          if echo "$TITLE" | grep -qiE '^[[:space:]]*feat[[:space:]]*:'; then
            PREFIX="feat"
          elif echo "$TITLE" | grep -qiE '^[[:space:]]*refactor[[:space:]]*:'; then
            PREFIX="refactor"
          elif echo "$TITLE" | grep -qiE '^[[:space:]]*fix[[:space:]]*:'; then
            PREFIX="fix"
          fi

          CLEAN=$(echo "$TITLE" | sed -E 's/^[[:space:]]*(feat|refactor|fix)[[:space:]]*:[[:space:]]*//I')
          SLUG=$(echo "$CLEAN" \
            | tr '[:upper:]' '[:lower:]' \
            | sed -E 's/[^a-z0-9]+/-/g' \
            | sed -E 's/^-+|-+$//g' \
            | cut -c1-40)

          # slug가 비면 fallback
          if [ -z "$SLUG" ]; then
            SLUG="work"
          fi

          BRANCH="${PREFIX}/issue-${NUM}-${SLUG}"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Create branch when issue opened
        if: github.event.action == 'opened'
        shell: bash
        run: |
          set -euo pipefail
          BRANCH="${{ steps.vars.outputs.branch }}"

          git init
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}"
          git fetch origin
          git checkout -b "$BRANCH" "origin/main"
          git push origin "$BRANCH"

      - name: Delete branch(es) when issue closed
        if: github.event.action == 'closed'
        shell: bash
        run: |
          set -euo pipefail
          NUM="${{ github.event.issue.number }}"

          echo "Finding branches for issue #$NUM"

          page=1
          while :; do
            resp=$(curl -sS \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/branches?per_page=100&page=$page")

            count=$(echo "$resp" | grep -c '"name":' || true)
            if [ "$count" -eq 0 ]; then
              break
            fi

            branches=$(echo "$resp" | grep -oE '"name":[[:space:]]*"[^"]+"' | sed -E 's/"name":[[:space:]]*"([^"]+)"/\1/')

            for br in $branches; do
              if [[ "$br" == */issue-${NUM}-* ]]; then
                echo "Deleting $br"

                br_enc="${br//\//%2F}"

                curl -sS -X DELETE \
                  -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
                  -H "Accept: application/vnd.github+json" \
                  "https://api.github.com/repos/${{ github.repository }}/git/refs/heads/${br_enc}" \
                  | cat
              fi
            done

            page=$((page+1))
          done
